services:
  booking-app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
    # Tag the image with both :latest and :${IMAGE_TAG} so every deploy
    # leaves the previous build in `docker images` for instant rollback.
    # Set IMAGE_TAG to the short git SHA on each deploy (see the deploy
    # script in OPERATIONS.md). Defaults to :latest if unset (dev).
    image: booking-app:${IMAGE_TAG:-latest}
    container_name: booking-app
    restart: unless-stopped
    # Container resource caps — guards against a runaway Node process
    # OOM-killing the host. Sized for the Hostinger KVM 1 plan, which
    # provides 1 vCPU + ~4 GB RAM. `cpus: 0.9` leaves a sliver of CPU
    # for Traefik + the host kernel; `mem_limit` is a hard cap (container
    # killed if exceeded), `mem_reservation` is the soft target.
    mem_limit: 1g
    mem_reservation: 256m
    cpus: 0.9
    # Cap container log file size so docker logs can't fill the disk on
    # a long-running deploy. Three 10 MB files = 30 MB ceiling per
    # container; older entries roll off automatically.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "3000:3000"
    # Inject ALL vars from .env into the container at runtime. This is what
    # makes the per-client CareFirst keys work: each client's API key lives in
    # .env as CAREFIRST_API_KEY__<CODE> (B1, see project_carefirst_handoff),
    # and a static `environment:` list can't enumerate dynamic per-client names.
    # env_file forwards every .env key automatically, so adding a client key is
    # just a .env edit + `docker compose up -d` — no compose change per client.
    # The explicit `environment:` entries below still take PRECEDENCE over
    # env_file (e.g. NODE_ENV) and document the core required vars.
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Server-side only — never set NEXT_PUBLIC_ prefix on this.
      # Read by src/lib/supabase-admin.ts in API routes.
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      # Server-side fallback so getSupabaseAdmin() can resolve the URL even
      # if the client bundle's inlined NEXT_PUBLIC_SUPABASE_URL isn't visible
      # to server runtime (it usually is, but be explicit).
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      # SMTP for sending PIN reset emails (nodemailer).
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      # PayFast payment gateway
      - PAYFAST_MERCHANT_ID=${PAYFAST_MERCHANT_ID}
      - PAYFAST_MERCHANT_KEY=${PAYFAST_MERCHANT_KEY}
      - PAYFAST_PASSPHRASE=${PAYFAST_PASSPHRASE}
      - PAYFAST_TEST_MODE=${PAYFAST_TEST_MODE}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      # CareFirst Patient SSO handoff
      - CAREFIRST_API_DOMAIN=${CAREFIRST_API_DOMAIN}
      - CAREFIRST_API_KEY=${CAREFIRST_API_KEY}
      - CAREFIRST_CLIENT_CODE=${CAREFIRST_CLIENT_CODE}
      - CAREFIRST_CLIENT_PLAN_CODE=${CAREFIRST_CLIENT_PLAN_CODE}
      # Cron auth — shared secret for the 15-min VPS crontab that hits
      # /api/payfast/reconcile, /api/admin/cleanup/sweep, /api/admin/incidents.
      # Must match the X-Cron-Secret header in /etc/cron.d/booking-app.
      - CRON_SECRET=${CRON_SECRET}
    # Traefik labels — production routing on bookings.carefirst.co.za with
    # HTTPS (Let's Encrypt) + HSTS (max-age=63072000; includeSubDomains).
    #
    # This file is the production deployment artefact. Local development
    # uses `npm run dev` directly (no docker-compose). If you DO run this
    # compose locally, you'll need a Traefik instance with the `letsencrypt`
    # cert resolver configured the same way the VPS Traefik is — otherwise
    # the container starts fine but Traefik can't route to it.
    #
    # Source of truth for these labels. Edits here propagate to the VPS on
    # next `git pull && docker compose up -d --build`. Manual SSH edits to
    # /opt/3rd-Party-Booking-System/booking-app/docker-compose.yml on the
    # VPS will be clobbered on the next pull. Keep them in sync.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.booking.rule=Host(`bookings.carefirst.co.za`)"
      - "traefik.http.routers.booking.entrypoints=websecure"
      - "traefik.http.routers.booking.tls=true"
      - "traefik.http.routers.booking.tls.certresolver=letsencrypt"
      - "traefik.http.services.booking.loadbalancer.server.port=3000"
      # HSTS middleware. preload=false intentionally until a one-week soak
      # passes — preload is a one-way change once submitted to Chromium.
      - "traefik.http.middlewares.hsts.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.hsts.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.hsts.headers.stsPreload=false"
      - "traefik.http.routers.booking.middlewares=hsts"
